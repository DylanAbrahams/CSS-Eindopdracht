<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dylan - CSS To The Resccue</title>
    <link rel="stylesheet" href="styles/style.css">
</head>

<body>

    <scene>
        <cube>

            <!-- Voorste laag (z = -1) -->
            <block style="--x:-1; --y:-1; --z:-1;"></block>
            <block style="--x:0;  --y:-1; --z:-1;"></block>
            <block style="--x:1;  --y:-1; --z:-1;"></block>

            <block style="--x:-1; --y:0;  --z:-1;"></block>
            <block style="--x:0;  --y:0;  --z:-1;"></block>
            <block style="--x:1;  --y:0;  --z:-1;"></block>

            <block style="--x:-1; --y:1;  --z:-1;"></block>
            <block style="--x:0;  --y:1; --z:-1;"></block>
            <block style="--x:1;  --y:1; --z:-1;"></block>

            <!-- Middelste laag (z = 0) -->
            <block style="--x:-1; --y:-1; --z:0;"></block>
            <block style="--x:0;  --y:-1; --z:0;"></block>
            <block style="--x:1;  --y:-1; --z:0;"></block>

            <block style="--x:-1; --y:0; --z:0;"></block>
            <block style="--x:0;  --y:0; --z:0;"></block>
            <block style="--x:1; --y:0; --z:0;"></block>

            <block style="--x:-1; --y:1; --z:0;"></block>
            <block style="--x:0; --y:1; --z:0;"></block>
            <block style="--x:1; --y:1; --z:0;"></block>

            <!-- Achterste laag (z = 1) -->
            <block style="--x:-1; --y:-1; --z:1;"></block>
            <block style="--x:0;  --y:-1; --z:1;"></block>
            <block style="--x:1;  --y:-1; --z:1;"></block>

            <block style="--x:-1; --y:0;  --z:1;"></block>
            <block style="--x:0;  --y:0; --z:1;"></block>
            <block style="--x:1;  --y:0; --z:1;"></block>

            <block style="--x:-1; --y:1; --z:1;"></block>
            <block style="--x:0;  --y:1; --z:1;"></block>
            <block style="--x:1;  --y:1; --z:1;"></block>

        </cube>
    </scene>

</body>

</html>
